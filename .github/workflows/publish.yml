name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish packages
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify versions match release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          MAIN_VERSION=$(grep -oP '"version": "\K[^"]+' purchasely/package.json)
          GOOGLE_VERSION=$(grep -oP '"version": "\K[^"]+' purchasely-google/package.json)

          if [ "$MAIN_VERSION" != "$TAG" ]; then
            echo "❌ purchasely/package.json version ($MAIN_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

          if [ "$GOOGLE_VERSION" != "$TAG" ]; then
            echo "❌ purchasely-google/package.json version ($GOOGLE_VERSION) does not match release tag ($TAG)"
            exit 1
          fi

          echo "✅ All versions match release tag: $TAG"

      - name: Publish @purchasely/cordova-plugin-purchasely
        working-directory: purchasely
        run: npm publish --access public --provenance

      - name: Publish @purchasely/cordova-plugin-purchasely-google
        working-directory: purchasely-google
        run: npm publish --access public --provenance
